<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">MegaDriveEnvironment development loop</title>
  <desc id="desc">Portable C++ game code branches into a fast native PC development loop and a separate ROM build and hardware validation path.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="md" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-fill"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <style>
      :root { color-scheme: light dark; }
      .canvas { fill: #f7f8fc; }
      .card { fill: #ffffff; stroke: #d8deea; stroke-width: 1.5; }
      .soft { fill: #eef2ff; stroke: #c7d2fe; stroke-width: 1.5; }
      .ink { fill: #172033; }
      .muted { fill: #5f6b7d; }
      .line { fill: none; stroke: #7c8799; stroke-width: 2.5; marker-end: url(#arrow); }
      .feedback { fill: none; stroke: #0891b2; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .validation { fill: none; stroke: #d97706; stroke-width: 2.5; stroke-dasharray: 8 7; marker-end: url(#arrow-amber); }
      .arrow-fill { fill: #7c8799; }
      .eyebrow { font: 700 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 1.7px; }
      .heading { font: 700 27px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { font: 500 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 600 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .white { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .canvas { fill: #0d1220; }
        .card { fill: #151c2d; stroke: #303a50; }
        .soft { fill: #1b2440; stroke: #3d4b75; }
        .ink { fill: #edf2ff; }
        .muted { fill: #aab4c8; }
        .line { stroke: #7f8ba1; }
        .arrow-fill { fill: #7f8ba1; }
      }
    </style>
  </defs>

  <rect class="canvas" width="1200" height="620" rx="28"/>

  <text x="600" y="48" text-anchor="middle" class="eyebrow muted">ONE GAME · TWO FEEDBACK LOOPS</text>
  <text x="600" y="82" text-anchor="middle" class="heading ink">Write game logic once; choose the right loop for the question</text>

  <g filter="url(#shadow)">
    <rect x="430" y="116" width="340" height="104" rx="20" fill="url(#hero)"/>
    <text x="600" y="153" text-anchor="middle" class="eyebrow white">SHARED SOURCE</text>
    <text x="600" y="184" text-anchor="middle" class="label white">Portable C++ game code</text>
    <text x="600" y="206" text-anchor="middle" class="small white" opacity=".82">logic · memory contract · hardware-style I/O</text>
  </g>

  <path class="line" d="M 515 220 C 515 252, 300 250, 300 286"/>
  <path class="line" d="M 685 220 C 685 252, 900 250, 900 286"/>

  <g filter="url(#shadow)">
    <rect x="86" y="286" width="428" height="232" rx="24" class="card"/>
    <rect x="86" y="286" width="428" height="56" rx="24" fill="url(#pc)"/>
    <path d="M86 318h428v24H86z" fill="url(#pc)"/>
    <circle cx="118" cy="314" r="9" fill="#67e8f9"/>
    <text x="142" y="321" class="label white">Native PC development</text>
    <text x="118" y="378" class="eyebrow" fill="#0891b2">MEGADRIVEENVIRONMENT</text>
    <text x="118" y="409" class="body ink">Runs the game as a normal host process</text>
    <text x="118" y="438" class="body muted">• breakpoints, stepping and memory inspection</text>
    <text x="118" y="465" class="body muted">• sanitizers, profilers and fast rebuilds</text>
    <text x="118" y="492" class="body muted">• VDP, audio, joypads and mapped memory</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="686" y="286" width="428" height="232" rx="24" class="card"/>
    <rect x="686" y="286" width="428" height="56" rx="24" fill="url(#md)"/>
    <path d="M686 318h428v24H686z" fill="url(#md)"/>
    <circle cx="718" cy="314" r="9" fill="#fde68a"/>
    <text x="742" y="321" class="label white">ROM compatibility validation</text>
    <text x="718" y="378" class="eyebrow" fill="#d97706">PROJECT TOOLCHAIN</text>
    <text x="718" y="409" class="body ink">Builds target adapters and the final ROM image</text>
    <text x="718" y="438" class="body muted">• test in independent Mega Drive emulators</text>
    <text x="718" y="465" class="body muted">• verify timing, memory and stack constraints</text>
    <text x="718" y="492" class="body muted">• finish on real hardware or a flash cartridge</text>
  </g>

  <path class="feedback" d="M 300 518 C 300 585, 546 581, 574 226"/>
  <text x="367" y="573" text-anchor="middle" class="small" fill="#0891b2">seconds: edit → build → debug</text>

  <path class="validation" d="M 900 518 C 900 548, 1140 548, 1140 260 C 1140 230, 770 246, 685 220"/>
  <text x="837" y="573" text-anchor="middle" class="small" fill="#d97706">milestones: build → validate → refine</text>

  <rect x="386" y="592" width="428" height="4" rx="2" fill="url(#hero)" opacity=".8"/>
</svg>
